<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    
</head>
<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <h2>TaskFlow</h2>

        <nav>

            <a href="dashboard.html" class="active">
                <i data-lucide="house"></i>
                <span>Home</span>
            </a>

            <a href="task.html">
                <i data-lucide="check-square"></i>
                <span>Tasks</span>
            </a>

            <a href="analytics.html">
                <i data-lucide="bar-chart-3"></i>
                <span>Analytics</span>
            </a>

            <a href="calendar.html">
                <i data-lucide="calendar-days"></i>
                <span>Calendar</span>
            </a>

            <a href="profile.html">
                <i data-lucide="user"></i>
                <span>Profile</span>
            </a>

        </nav>

    </aside>

    <!-- MAIN CONTENT -->

    <main class="dashboard">

        <!-- HEADER -->

        <div class="dashboard-header">

            <div class="user-info">

                <h1 id="welcomeMessage">
                    Good Morning 👋
                </h1>

                <p>
                    Welcome back to TaskFlow
                </p>

            </div>

            <div class="header-actions">

                <button class="notification-btn">
                    🔔
                </button>

                <div class="profile-area">

                    <i data-lucide="user"></i>

                </div>

            </div>

        </div>

        <!-- ANALYTICS LINK -->

        <div class="dashboard-links">

            <a href="analytics.html">
                View Analytics →
            </a>

        </div>

        <!-- STATS -->

        <div class="stats-grid">

            <div class="stat-card">
                <h3>Total Tasks</h3>
                <h1 id="totalTasks">0</h1>
            </div>

            <div class="stat-card">
                <h3>Completed</h3>
                <h1 id="completedTasks">0</h1>
            </div>

            <div class="stat-card">
                <h3>Pending</h3>
                <h1 id="pendingTasks">0</h1>
            </div>

            <div class="stat-card">
                <h3>Completion %</h3>
                <h1 id="completionRate">0%</h1>
            </div>

        </div>


        <div class="dashboard-links">
            <a href="task.html">
                My Tasks →
            </a>

        </div>
        <!-- TASK AREA -->

        <div class="container" id="empty-state">
            <img src="asset/no task.png" alt="No task yet">
            <h2>No task yet</h2>
            <p>Stay organized and productive.</p>
            <p>Your tasks appear here. </p>
        </div>

        <div class="task-grid" id="task-grid">
            
        </div>

    </main>

</div>

<!-- FLOATING BUTTON -->


<!-- MOBILE NAVIGATION -->

<div class="bottom-nav">

    <a href="dashboard.html" class="nav-item active">
        <i data-lucide="house"></i>
        <span>Home</span>
    </a>

    <a href="task.html" class="nav-item">
        <i data-lucide="check-square"></i>
        <span>Tasks</span>
    </a>

    <a href="analytics.html" class="nav-item">
        <i data-lucide="bar-chart-3"></i>
        <span>Analytics</span>
    </a>

    <a href="calendar.html" class="nav-item">
        <i data-lucide="calendar-days"></i>
        <span>Calendar</span>
    </a>

    <a href="profile.html" class="nav-item">
        <i data-lucide="user"></i>
        <span>Profile</span>
    </a>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("taskflowUser")
);

if(user){

    document.getElementById("welcomeMessage")
    .textContent =
    `Good Morning, ${user.name} 👋`;

}

const tasks =
JSON.parse(
localStorage.getItem("tasks")
) || [];

const taskGrid =
document.getElementById("task-grid");

const emptyState =
document.getElementById("empty-state");

/* ANALYTICS */

const total = tasks.length;

const completed =
tasks.filter(task => task.completed).length;

const pending =
total - completed;

const percentage =
total > 0
? Math.round((completed / total) * 100)
: 0;

document.getElementById("totalTasks").textContent =
total;

document.getElementById("completedTasks").textContent =
completed;

document.getElementById("pendingTasks").textContent =
pending;

document.getElementById("completionRate").textContent =
percentage + "%";

/* TASKS */

if(tasks.length > 0){

    emptyState.style.display = "none";

    let html = "";

    tasks.forEach((task,index)=>{

        html += `

        <div
            class="task-card ${task.completed ? 'completed' : ''}"
            onclick="openTask(${index})"
        >

            <div class="task-header">

                <div class="task-check">

                    <input
                        type="checkbox"
                        ${task.completed ? "checked" : ""}
                        disabled
                    >

                    <h3 class="${task.completed ? 'completed-task' : ''}">
                        ${task.title}
                    </h3>

                </div>

            </div>

            <p>${task.description}</p>

            <p>
                ${task.date}
                ${task.time}
            </p>

            <span class="priority ${task.priority.toLowerCase()}">
                ${task.priority}
            </span>

        </div>

        `;

    });

    taskGrid.innerHTML = html;

}else{

    emptyState.style.display = "flex";

}

function openTask(index){

    localStorage.setItem(
        "selectedTask",
        index
    );

    window.location.href =
    "task-details.html";

}

</script>

<script src="https://unpkg.com/lucide@latest"></script>

<script>
    lucide.createIcons();
</script>

<script src="task.js"></script>


</body>
</html>
