<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks</title>
    <link rel="stylesheet" href="task.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <nav class="header-navbar">
        <div class="header-title">
            <a href="#">
                <i class="bx bx-menu"></i>
            </a>
            <h2>My Tasks</h2>
            <div class="icons">
                <a href="#">
                    <i class="bx bx-search"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- ALL CONTENT TO HIDE WHEN FORM OPENS -->
    <div id="main-content">
        <div class="dashboard">
            <div class="box">
                <p>Total: <span id="total-count">0</span></p>
            </div>
            <div class="box">
                <p>Pending: <span id="pending-count">0</span></p>
            </div>
            <div class="box">
                <p>Completed: <span id="completed-count">0</span></p>
            </div>
        </div>

        <div class="container" id="empty-state">
            <img src="asset/no task.png" alt="No task yet">
            <h2>No task yet</h2>
            <p>Stay organized and productive by creating your first task.</p>
        </div>

        <div class="task-grid" id="task-grid">
            
        </div>
    </div>

    <!-- ADD BUTTON - ALWAYS VISIBLE -->
    <button id="open-form" class="add-btn">+</button>

    <!-- Load External Form -->
    <div id="form-container"></div>

    <script src="task.js"></script>
</body>
</html>
