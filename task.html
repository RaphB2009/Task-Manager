<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks</title>
    <link rel="stylesheet" href="css/task.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
</head>
<body>
<div class="app">
    <aside class="sidebar">

        <h2>TaskFlow</h2>

        <nav>

            <a href="dashboard.html">
                <i data-lucide="house"></i>
                <span>Home</span>
            </a>

            <a href="task.html" class="active">
                <i data-lucide="check-square"></i>
                <span>Tasks</span>
            </a>

            <a href="analytics.html">
                <i data-lucide="bar-chart-3"></i>
                <span>Analytics</span>
            </a>

            <a href="calendar.html">
                <i data-lucide="calendar-days"></i>
                <span>Calendar</span>
            </a>

            <a href="profile.html">
                <i data-lucide="user"></i>
                <span>Profile</span>
            </a>

        </nav>

    </aside>

    <main class="dashboards">
        <div class="header-div">
            <div class="header-title">
                <h2>My Tasks</h2>    
            </div>
            <div class="icons">
                <a href="#">
                    <i class="bx bx-search"></i>
                </a>
            </div>
        </div>

        <!-- ALL CONTENT TO HIDE WHEN FORM OPENS -->
        <div id="main-content">
            <div class="dashboard">
                <div class="box">
                    <p>Total: <span id="total-count">0</span></p>
                </div>
                <div class="box">
                    <p>Pending: <span id="pending-count">0</span></p>
                </div>
                <div class="box">
                    <p>Completed: <span id="completed-count">0</span></p>
                </div>
            </div>

            <div class="container" id="empty-state">
                <img src="asset/no task.png" alt="No task yet">
                <h2>No task yet</h2>
                <p>Stay organized and productive by creating your first task.</p>
            </div>

            <div class="task-grid" id="task-grid">
            
            </div>
        </div>

        <!-- ADD BUTTON - ALWAYS VISIBLE -->
        <button id="open-form" class="add-btn">+</button>

        <!-- Load External Form -->
        <div id="form-container"></div>

    </main>
</div>

<div class="bottom-nav">

    <a href="dashboard.html"  class="nav-item">
        <i data-lucide="house"></i>
        <span>Home</span>
    </a>

    <a href="task.html" class="nav-item active">
        <i data-lucide="check-square"></i>
        <span>Tasks</span>
    </a>

    <a href="analytics.html" class="nav-item">
        <i data-lucide="bar-chart-3"></i>
        <span>Analytics</span>
    </a>

    <a href="calendar.html" class="nav-item">
        <i data-lucide="calendar-days"></i>
        <span>Calendar</span>
    </a>

    <a href="profile.html" class="nav-item">
        <i data-lucide="user"></i>
        <span>Profile</span>
    </a>

</div>
    <script src="task.js"></script>
</body>
</html>
