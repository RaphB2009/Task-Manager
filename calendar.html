<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendar - TaskFlow</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

<script src="https://unpkg.com/lucide@latest"></script>

</head>
<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <h2>TaskFlow</h2>

        <nav>

            <a href="dashboard.html">
                <i data-lucide="house"></i>
                <span>Home</span>
            </a>

            <a href="task.html">
                <i data-lucide="check-square"></i>
                <span>Tasks</span>
            </a>

            <a href="analytics.html">
                <i data-lucide="bar-chart-3"></i>
                <span>Analytics</span>
            </a>

            <a href="calendar.html" class="active">
                <i data-lucide="calendar-days"></i>
                <span>Calendar</span>
            </a>

            <a href="profile.html">
                <i data-lucide="user"></i>
                <span>Profile</span>
            </a>

        </nav>

    </aside>

    <!-- MAIN -->

    <main class="dashboard">

        <div class="dashboard-header">

            <div>
                <h1>Calendar</h1>
                <p>View tasks by due date</p>
            </div>

        </div>

        <!-- CALENDAR -->

        <div class="calendar-container">

            <div class="calendar-header">

                <button id="prevMonth">
                    ←
                </button>

                <h2 id="monthYear"></h2>

                <button id="nextMonth">
                    →
                </button>

            </div>

            <div class="weekdays">

                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>

            </div>

            <div id="calendarGrid" class="calendar-grid">

            </div>

        </div>

        <!-- TASKS FOR DAY -->

        <div class="calendar-tasks">

            <h2>Tasks</h2>

            <div id="selectedDayTasks">

                <p>Select a date to view tasks.</p>

            </div>

        </div>

    </main>

</div>

<!-- MOBILE NAV -->

<div class="bottom-nav">

    <a href="dashboard.html" class="nav-item">
        <i data-lucide="house"></i>
        <span>Home</span>
    </a>

    <a href="task.html" class="nav-item">
        <i data-lucide="check-square"></i>
        <span>Tasks</span>
    </a>

    <a href="analytics.html" class="nav-item">
        <i data-lucide="bar-chart-3"></i>
        <span>Analytics</span>
    </a>

    <a href="calendar.html" class="nav-item active">
        <i data-lucide="calendar-days"></i>
        <span>Calendar</span>
    </a>

    <a href="profile.html" class="nav-item">
        <i data-lucide="user"></i>
        <span>Profile</span>
    </a>

</div>

<script>

lucide.createIcons();

const calendarGrid =
document.getElementById("calendarGrid");

const monthYear =
document.getElementById("monthYear");

const selectedDayTasks =
document.getElementById("selectedDayTasks");

const tasks =
JSON.parse(
localStorage.getItem("tasks")
) || [];

let currentDate =
new Date();

function renderCalendar(){

    calendarGrid.innerHTML = "";

    const year =
    currentDate.getFullYear();

    const month =
    currentDate.getMonth();

    const firstDay =
    new Date(year,month,1).getDay();

    const lastDate =
    new Date(year,month+1,0).getDate();

    monthYear.textContent =
    currentDate.toLocaleString("default",{
        month:"long",
        year:"numeric"
    });

    for(let i=0;i<firstDay;i++){

        calendarGrid.innerHTML +=
        `<div class="calendar-day empty"></div>`;

    }

    for(let day=1;day<=lastDate;day++){

        const dateString =
        `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

        const dayTasks =
        tasks.filter(
            task => task.date === dateString
        );

        calendarGrid.innerHTML += `
        <div class="calendar-day"
                onclick="showTasks('${dateString}')">

            <span>${day}</span>

            ${dayTasks.length > 0
            ? `<div class="task-indicator">
                    ${dayTasks.length}
                </div>`
            : ""}

        </div>
        `;
    }
}

function showTasks(date){

    const filtered =
    tasks.filter(
        task => task.date === date
    );

    if(filtered.length === 0){

        selectedDayTasks.innerHTML =
        "<p>No tasks on this date.</p>";

        return;
    }

    selectedDayTasks.innerHTML =
    filtered.map(task => `

        <div class="task-card">

            <h3>${task.title}</h3>

            <p>${task.description}</p>

            <p>${task.time}</p>

            <span class="priority ${task.priority.toLowerCase()}">
                ${task.priority}
            </span>

        </div>

    `).join("");
}

document
.getElementById("prevMonth")
.onclick = () => {

    currentDate.setMonth(
        currentDate.getMonth()-1
    );

    renderCalendar();
};

document
.getElementById("nextMonth")
.onclick = () => {

    currentDate.setMonth(
        currentDate.getMonth()+1
    );

    renderCalendar();
};

renderCalendar();

</script>

</body>
</html>
