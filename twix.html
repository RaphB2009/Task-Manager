<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Dashboard</title>
  <link rel="stylesheet" href="twix.css">
</head>
<body>

<div class="container">

  <h1>Analytics Dashboard</h1>

  <div class="top-card">

    <!-- Circular Progress -->
    <div class="progress-section">

      <div class="progress-ring">
        <svg width="180" height="180">
          <circle
            class="bg"
            cx="90"
            cy="90"
            r="70">
          </circle>

          <circle
            class="progress"
            cx="90"
            cy="90"
            r="70">
          </circle>
        </svg>

        <div class="progress-text">
          <h2>68%</h2>
          <p>Completed</p>
        </div>
      </div>

    </div>

    <!-- Bar Chart -->
    <div class="chart-section">

      <div class="bars">
        <div class="bar" style="height:80px"></div>
        <div class="bar" style="height:120px"></div>
        <div class="bar" style="height:170px"></div>
        <div class="bar" style="height:130px"></div>
        <div class="bar" style="height:100px"></div>
        <div class="bar" style="height:140px"></div>
      </div>

      <div class="labels">
        <span>Mon</span>
        <span>Tue</span>
        <span>Wed</span>
        <span>Thu</span>
        <span>Fri</span>
        <span>Sat</span>
      </div>

    </div>

  </div>

  <!-- Categories -->
  <div class="categories">

    <div class="item">
      <span>Work</span>
      <div class="line">
        <div class="fill purple"></div>
      </div>
      <span>40%</span>
    </div>

    <div class="item">
      <span>Study</span>
      <div class="line">
        <div class="fill orange"></div>
      </div>
      <span>27%</span>
    </div>

    <div class="item">
      <span>Personal</span>
      <div class="line">
        <div class="fill green"></div>
      </div>
      <span>20%</span>
    </div>

    <div class="item">
      <span>Health</span>
      <div class="line">
        <div class="fill blue"></div>
      </div>
      <span>13%</span>
    </div>

  </div>

</div>
<script src="twix.js"></script>
</body>
</html>
