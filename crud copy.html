<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskManager - Home</title>
    <link rel="stylesheet" href="css/crud copy.css">
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
/>
</head>
<body>
    <section class="hero">

    <div class="hero-content">
        <h1>
            Organize tasks.<br>
            Boost <span>productivity.</span>
        </h1>

        <p>
            Smart Task Manager helps you stay focused and get more done every day.
        </p>

        <a href="dashboard.html"><button>Get Started</button></a>
        <a href="#">Have an account?</a>
    </div>

    <div class="hero-image">

        <!-- SWIPER STARTS HERE -->
        <div class="swiper mySwiper">

            <div class="swiper-wrapper">

                <div class="swiper-slide">
                    <img src="asset/lady.png" alt="image">
                </div>

                <div class="swiper-slide">
                    <img class="chacha" src="asset/image2.png" alt="image">
                </div>

                <div class="swiper-slide">
                    <img class="chatgpt" src="asset/image1.png" alt="image">
                </div>

                <div class="swiper-slide">
                    <img class="chamcham" src="asset/image3.png" alt="">
                </div>

            </div>

            <div class="swiper-pagination"></div>

        </div>
        <!-- SWIPER ENDS HERE -->

    </div>

</section>
<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    var swiper = new Swiper(".mySwiper", {
        loop: true,

        autoplay: {
            delay: 3000,
            disableOnInteraction: false,
        },

        pagination: {
            el: ".swiper-pagination",
            clickable: true,
        },
    });
</script>

</body>

</body>
</html>
